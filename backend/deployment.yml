apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: devops
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: tejaskalal/backend:066b1c939ff6fc9887f5f3a96b15d75bf80cfffd
          ports:
            - containerPort: 80
          env:
            - name: REDIS_HOST
              value: redis

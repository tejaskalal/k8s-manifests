apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: devops
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: tejaskalal/backend:3c9704a36f20ed79af36666f74c26d092e137e37
          ports:
            - containerPort: 80
          env:
            - name: REDIS_HOST
              value: redis

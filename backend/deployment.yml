apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: devops
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: tejaskalal/backend:fefc5858f3a929066f4c65a40cecb112790f36cb
          ports:
            - containerPort: 80
          env:
            - name: REDIS_HOST
              value: redis

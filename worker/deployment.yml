apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: devops
spec:
  replicas: 1
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
    spec:
      containers:
        - name: worker
          image: tejaskalal/worker:180b5a88b7cac8ab001c91de9ae39bae49257ab0
          env:
            - name: REDIS_HOST
              value: redis

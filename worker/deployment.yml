apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: devops
spec:
  replicas: 1
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
    spec:
      containers:
        - name: worker
          image: tejaskalal/worker:66fdeb3d6b30ed1723752a804cd19f7f95dbf115
          env:
            - name: REDIS_HOST
              value: redis
